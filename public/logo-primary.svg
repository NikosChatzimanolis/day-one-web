<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&amp;family=Jost:wght@200;300&amp;display=swap');
      .script { font-family: 'Alex Brush', cursive; fill: #C04C2A; }
      .divider { stroke: #C04C2A; stroke-opacity: 0.35; }
      .word-one { font-family: 'Jost', sans-serif; font-weight: 200; fill: #1A1816; letter-spacing: 3px; }
      .tagline { font-family: 'Jost', sans-serif; font-weight: 300; fill: #9A8F82; letter-spacing: 2.5px; }
    </style>
  </defs>
  <!-- Day script -->
  <text x="10" y="82" class="script" font-size="88">Day</text>
  <!-- Vertical divider -->
  <line x1="188" y1="14" x2="188" y2="90" class="divider" stroke-width="1.5"/>
  <!-- One + tagline -->
  <text x="204" y="62" class="word-one" font-size="26" text-anchor="start">ONE</text>
  <text x="205" y="82" class="tagline" font-size="8.5" text-anchor="start">WEB STUDIO</text>
</svg>
